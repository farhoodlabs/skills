apiVersion: batch/v1
kind: Job
metadata:
  name: "{{SESSION_NAME}}"
  namespace: "{{NAMESPACE}}"
  labels:
    app: playwright-mcp
    session: "{{SESSION_NAME}}"
spec:
  ttlSecondsAfterFinished: {{TTL}}
  activeDeadlineSeconds: {{DEADLINE}}
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: playwright-mcp
        session: "{{SESSION_NAME}}"
    spec:
      shareProcessNamespace: true
      restartPolicy: Never
      containers:
        - name: playwright-mcp
          image: mcr.microsoft.com/playwright/mcp
          command: ["node"]
          args:
            - "cli.js"
            - "--headless"
            - "--browser"
            - "chromium"
            - "--no-sandbox"
            - "--port"
            - "8931"
            - "--host"
            - "0.0.0.0"
          ports:
            - containerPort: 8931
              protocol: TCP
          resources:
            requests:
              memory: "{{MEMORY_REQUEST}}"
              cpu: "250m"
            limits:
              memory: "{{MEMORY_LIMIT}}"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /mcp
              port: 8931
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 20
